app = "discord-bot-dashboard"
kill_timeout = "35s"
primary_region = "cdg"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 8_080
min_machines_running = 0
processes = [ "app" ]

  [[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
