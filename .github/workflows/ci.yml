name: dashboard-ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend-quality:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend unit tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build

  backend-smoke:
    name: Backend install + start smoke
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.adminCommand('ping').ok\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Check dashboard contract sync
        run: npm run check:contract

      - name: Start backend briefly
        env:
          DISCORD_CLIENT_ID: test
          DISCORD_CLIENT_SECRET: test
          DISCORD_BOT_TOKEN: test
          DATABASE_TOKEN: mongodb://127.0.0.1:27017/test?directConnection=true
          SESSION_SECRET: 0123456789abcdef0123456789abcdef
          DASHBOARD_URL: http://localhost:3000
          CALLBACK_URL: http://localhost:8080/auth/discord/callback
        run: |
          npm start &
          SERVER_PID=$!
          trap "kill $SERVER_PID || true" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "Backend health check passed"
              exit 0
            fi
            sleep 1
          done

          echo "Backend failed health check in time"
          exit 1
